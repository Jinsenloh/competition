services:
  - type: web
    name: agent-support-counter
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SUPPORT_COUNTER_DB
        value: /tmp/agent_support_counter.db
      - key: SERVE_FRONTEND
        value: "false"
      - key: SUPPORT_COUNTER_ADMIN_PASSWORD
        sync: false
      - key: SUPPORT_COUNTER_SUPERVISOR_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SUPPORT_COUNTER_CORS_ORIGINS
        sync: false
